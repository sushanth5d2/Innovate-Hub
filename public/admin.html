<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Innovate Hub</title>
  <link rel="stylesheet" href="/css/instagram.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --admin-bg: #0a0a0f;
      --admin-surface: #13131a;
      --admin-surface2: #1a1a24;
      --admin-border: rgba(255,255,255,0.08);
      --admin-text: #f0f0f5;
      --admin-text2: #8888a0;
      --admin-accent: #6c5ce7;
      --admin-accent2: #a29bfe;
      --admin-danger: #ef4444;
      --admin-success: #10b981;
      --admin-warning: #f59e0b;
      --admin-radius: 14px;
    }
    * { box-sizing: border-box; }
    body { margin:0; padding:0; background:var(--admin-bg); color:var(--admin-text); font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif; }

    /* Header */
    .admin-header {
      position:sticky; top:0; z-index:100;
      background:rgba(10,10,15,0.9); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--admin-border);
      padding:0 24px; height:60px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .admin-header-left { display:flex; align-items:center; gap:12px; }
    .admin-logo { font-size:18px; font-weight:800; background:linear-gradient(135deg,#a29bfe,#6c5ce7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .admin-badge { font-size:10px; padding:3px 8px; border-radius:20px; background:var(--admin-accent); color:#fff; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
    .admin-header-right { display:flex; align-items:center; gap:12px; }
    .admin-header-btn { padding:8px 16px; border-radius:10px; border:1px solid var(--admin-border); background:var(--admin-surface); color:var(--admin-text); cursor:pointer; font-size:13px; font-weight:500; transition:all 0.2s; text-decoration:none; }
    .admin-header-btn:hover { background:var(--admin-surface2); border-color:rgba(255,255,255,0.15); }

    /* Main layout */
    .admin-main { max-width:1200px; margin:0 auto; padding:24px; }

    /* Tabs */
    .admin-tabs {
      display:flex; gap:4px; margin-bottom:24px; background:var(--admin-surface); border-radius:12px; padding:4px;
      overflow-x:auto; -webkit-overflow-scrolling:touch;
    }
    .admin-tab {
      padding:10px 20px; border-radius:10px; border:none; background:transparent;
      color:var(--admin-text2); cursor:pointer; font-size:13px; font-weight:600;
      transition:all 0.2s; white-space:nowrap;
    }
    .admin-tab.active { background:var(--admin-accent); color:#fff; }
    .admin-tab:hover:not(.active) { background:var(--admin-surface2); color:var(--admin-text); }

    /* Stats cards */
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:24px; }
    .stat-card {
      background:var(--admin-surface); border:1px solid var(--admin-border); border-radius:var(--admin-radius);
      padding:20px; transition:all 0.2s;
    }
    .stat-card:hover { border-color:rgba(255,255,255,0.15); transform:translateY(-2px); }
    .stat-card-label { font-size:12px; color:var(--admin-text2); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; }
    .stat-card-value { font-size:32px; font-weight:800; background:linear-gradient(135deg,#a29bfe,#6c5ce7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .stat-card-sub { font-size:12px; color:var(--admin-text2); margin-top:4px; }

    /* Panel */
    .admin-panel {
      background:var(--admin-surface); border:1px solid var(--admin-border);
      border-radius:var(--admin-radius); overflow:hidden; margin-bottom:24px;
    }
    .panel-header {
      padding:16px 20px; border-bottom:1px solid var(--admin-border);
      display:flex; align-items:center; justify-content:space-between;
    }
    .panel-title { font-size:15px; font-weight:700; }
    .panel-body { padding:0; }

    /* Search bar */
    .admin-search {
      padding:12px 20px; border-bottom:1px solid var(--admin-border);
      display:flex; gap:8px; align-items:center;
    }
    .admin-search input {
      flex:1; padding:10px 14px; border-radius:10px; border:1px solid var(--admin-border);
      background:var(--admin-bg); color:var(--admin-text); font-size:14px; outline:none;
    }
    .admin-search input:focus { border-color:var(--admin-accent); }
    .admin-search select {
      padding:10px 14px; border-radius:10px; border:1px solid var(--admin-border);
      background:var(--admin-bg); color:var(--admin-text); font-size:13px; outline:none;
    }

    /* User row */
    .user-row {
      display:flex; align-items:center; gap:14px; padding:14px 20px;
      border-bottom:1px solid var(--admin-border); transition:background 0.15s;
    }
    .user-row:hover { background:var(--admin-surface2); }
    .user-row:last-child { border-bottom:none; }
    .user-avatar { width:40px; height:40px; border-radius:50%; object-fit:cover; background:var(--admin-surface2); }
    .user-info { flex:1; min-width:0; }
    .user-name { font-size:14px; font-weight:600; }
    .user-email { font-size:12px; color:var(--admin-text2); }
    .user-meta { display:flex; gap:12px; font-size:11px; color:var(--admin-text2); margin-top:2px; }
    .user-status { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:600; }
    .user-status.active { background:rgba(16,185,129,0.12); color:var(--admin-success); }
    .user-status.banned { background:rgba(239,68,68,0.12); color:var(--admin-danger); }
    .user-status.deactivated { background:rgba(136,136,160,0.12); color:var(--admin-text2); }
    .user-status.admin-role { background:rgba(108,92,231,0.12); color:var(--admin-accent2); }
    .user-actions { display:flex; gap:6px; flex-shrink:0; }
    .action-btn {
      padding:6px 12px; border-radius:8px; border:1px solid var(--admin-border);
      background:var(--admin-surface2); color:var(--admin-text); cursor:pointer;
      font-size:12px; font-weight:500; transition:all 0.2s;
    }
    .action-btn:hover { border-color:rgba(255,255,255,0.2); }
    .action-btn.danger { border-color:rgba(239,68,68,0.3); color:var(--admin-danger); }
    .action-btn.danger:hover { background:rgba(239,68,68,0.1); }
    .action-btn.success { border-color:rgba(16,185,129,0.3); color:var(--admin-success); }
    .action-btn.success:hover { background:rgba(16,185,129,0.1); }

    /* Report row */
    .report-row {
      padding:16px 20px; border-bottom:1px solid var(--admin-border);
    }
    .report-row:last-child { border-bottom:none; }
    .report-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
    .report-reason { display:inline-block; padding:3px 10px; border-radius:6px; background:rgba(245,158,11,0.12); color:var(--admin-warning); font-size:12px; font-weight:600; text-transform:capitalize; }
    .report-date { font-size:11px; color:var(--admin-text2); }
    .report-content { background:var(--admin-bg); border-radius:10px; padding:12px 16px; margin:8px 0; font-size:13px; color:var(--admin-text2); border:1px solid var(--admin-border); }
    .report-meta { display:flex; gap:16px; font-size:12px; color:var(--admin-text2); margin:8px 0; }
    .report-actions { display:flex; gap:8px; margin-top:10px; }

    /* Announcement form */
    .announce-form { padding:20px; }
    .announce-form textarea {
      width:100%; min-height:120px; padding:14px; border-radius:10px;
      border:1px solid var(--admin-border); background:var(--admin-bg);
      color:var(--admin-text); font-size:14px; resize:vertical; outline:none;
      font-family:inherit; box-sizing:border-box;
    }
    .announce-form textarea:focus { border-color:var(--admin-accent); }
    .announce-controls { display:flex; gap:12px; align-items:center; margin-top:12px; }
    .announce-controls select {
      padding:10px 14px; border-radius:10px; border:1px solid var(--admin-border);
      background:var(--admin-bg); color:var(--admin-text); font-size:13px;
    }
    .announce-btn {
      padding:10px 24px; border-radius:10px; border:none;
      background:linear-gradient(135deg,#6c5ce7,#a29bfe); color:#fff;
      cursor:pointer; font-weight:700; font-size:14px; transition:all 0.2s;
    }
    .announce-btn:hover { box-shadow:0 4px 15px rgba(108,92,231,0.3); }

    /* Action log */
    .log-row { padding:10px 20px; border-bottom:1px solid var(--admin-border); font-size:13px; display:flex; gap:12px; }
    .log-time { color:var(--admin-text2); font-size:11px; flex-shrink:0; width:130px; }
    .log-action { flex:1; }
    .log-type { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
    .log-type.ban { background:rgba(239,68,68,0.12); color:var(--admin-danger); }
    .log-type.unban { background:rgba(16,185,129,0.12); color:var(--admin-success); }
    .log-type.delete { background:rgba(245,158,11,0.12); color:var(--admin-warning); }
    .log-type.announce { background:rgba(108,92,231,0.12); color:var(--admin-accent2); }

    /* Tab panels */
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    /* Empty state */
    .empty-state { text-align:center; padding:48px 20px; color:var(--admin-text2); }
    .empty-state i { font-size:40px; opacity:0.2; display:block; margin-bottom:12px; }

    /* Ban dialog */
    .ban-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:10000;
      display:flex; align-items:center; justify-content:center;
    }
    .ban-dialog {
      background:var(--admin-surface); border:1px solid var(--admin-border);
      border-radius:16px; padding:28px; max-width:400px; width:90%;
    }
    .ban-dialog h3 { margin:0 0 16px; font-size:18px; }
    .ban-dialog label { display:block; font-size:13px; color:var(--admin-text2); margin-bottom:4px; }
    .ban-dialog input, .ban-dialog select, .ban-dialog textarea {
      width:100%; padding:10px; border-radius:8px; border:1px solid var(--admin-border);
      background:var(--admin-bg); color:var(--admin-text); font-size:14px;
      margin-bottom:12px; box-sizing:border-box;
    }
    .ban-dialog textarea { min-height:80px; resize:vertical; font-family:inherit; }
    .ban-dialog-buttons { display:flex; gap:8px; justify-content:flex-end; margin-top:4px; }
    .ban-dialog-buttons button { padding:10px 20px; border-radius:10px; cursor:pointer; font-size:14px; font-weight:600; }

    /* Responsive */
    @media (max-width:768px) {
      .admin-main { padding:12px; }
      .stats-grid { grid-template-columns:repeat(2, 1fr); gap:10px; }
      .stat-card { padding:14px; }
      .stat-card-value { font-size:24px; }
      .user-row { flex-wrap:wrap; gap:8px; padding:12px 14px; }
      .user-actions { width:100%; justify-content:flex-end; }
      .admin-tabs { gap:2px; }
      .admin-tab { padding:8px 14px; font-size:12px; }
    }
  </style>
</head>
<body>
  <header class="admin-header">
    <div class="admin-header-left">
      <span class="admin-logo">Innovate Hub</span>
      <span class="admin-badge">Admin</span>
    </div>
    <div class="admin-header-right">
      <span id="admin-user" style="font-size:13px;color:var(--admin-text2);"></span>
      <a href="/home" class="admin-header-btn"><i class="fas fa-home"></i> App</a>
      <button class="admin-header-btn" onclick="adminLogout()" style="cursor:pointer;"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </div>
  </header>

  <main class="admin-main">
    <!-- Tabs -->
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="overview">Overview</button>
      <button class="admin-tab" data-tab="users">Users</button>
      <button class="admin-tab" data-tab="reports">Reports</button>
      <button class="admin-tab" data-tab="announcements">Announcements</button>
      <button class="admin-tab" data-tab="logs">Activity Log</button>
    </div>

    <!-- OVERVIEW TAB -->
    <div class="tab-panel active" id="tab-overview">
      <div class="stats-grid" id="stats-grid"></div>
    </div>

    <!-- USERS TAB -->
    <div class="tab-panel" id="tab-users">
      <div class="admin-panel">
        <div class="panel-header">
          <span class="panel-title">All Users</span>
          <span id="user-total" style="font-size:12px;color:var(--admin-text2);"></span>
        </div>
        <div class="admin-search">
          <input type="text" id="user-search" placeholder="Search by username or email...">
          <select id="user-filter">
            <option value="">All</option>
            <option value="active">Active</option>
            <option value="banned">Banned</option>
            <option value="deactivated">Deactivated</option>
            <option value="admin">Admins</option>
          </select>
        </div>
        <div class="panel-body" id="users-list"></div>
      </div>
    </div>

    <!-- REPORTS TAB -->
    <div class="tab-panel" id="tab-reports">
      <div class="admin-panel">
        <div class="panel-header">
          <span class="panel-title">Reported Posts</span>
          <select id="report-filter" style="padding:6px 12px;border-radius:8px;border:1px solid var(--admin-border);background:var(--admin-bg);color:var(--admin-text);font-size:12px;">
            <option value="pending">Pending</option>
            <option value="dismissed">Dismissed</option>
            <option value="resolved">Resolved</option>
          </select>
        </div>
        <div class="panel-body" id="reports-list"></div>
      </div>
    </div>

    <!-- ADMIN POST CREATION TAB -->
    <div class="tab-panel" id="tab-announcements">
      <div class="admin-panel">
        <div class="panel-header">
          <span class="panel-title"><i class="fas fa-plus-circle" style="color:var(--admin-accent);margin-right:6px;"></i>Create Admin Post</span>
        </div>
        <div class="announce-form">
          <!-- Post Type Toggle -->
          <div style="display:flex;gap:8px;margin-bottom:14px;">
            <button class="action-btn" id="btn-post-type" onclick="toggleAdminPostType('post')" style="padding:8px 18px;font-weight:600;background:var(--admin-accent);color:#fff;border-color:var(--admin-accent);">Post</button>
            <button class="action-btn" id="btn-series-type" onclick="toggleAdminPostType('series')" style="padding:8px 18px;font-weight:600;">Creator Series</button>
          </div>

          <!-- Caption -->
          <textarea id="announce-content" placeholder="Write the content or caption..."></textarea>

          <!-- Media Upload -->
          <div style="margin-top:12px;">
            <label style="display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;border:1px dashed var(--admin-border);cursor:pointer;color:var(--admin-text2);font-size:13px;transition:all 0.2s;" onmouseover="this.style.borderColor='var(--admin-accent)'" onmouseout="this.style.borderColor='var(--admin-border)'">
              <input type="file" id="admin-post-media" accept="image/*,video/*" multiple style="display:none" onchange="previewAdminMedia(this)">
              <i class="fas fa-image"></i> Add Photos / Video
            </label>
            <div id="admin-media-preview" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;"></div>
          </div>

          <!-- Feed Controls -->
          <div style="margin-top:18px;padding:16px;background:var(--admin-bg);border-radius:12px;border:1px solid var(--admin-border);">
            <div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--admin-accent2);"><i class="fas fa-sliders-h" style="margin-right:6px;"></i>Feed Display Settings</div>
            
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
              <!-- Frequency -->
              <div>
                <label style="display:block;font-size:11px;color:var(--admin-text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Display Frequency</label>
                <select id="announce-freq" style="width:100%;">
                  <option value="once">Show Once</option>
                  <option value="daily">Daily (recurring)</option>
                  <option value="weekly">Weekly (recurring)</option>
                </select>
              </div>
              <!-- Position -->
              <div>
                <label style="display:block;font-size:11px;color:var(--admin-text2);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Show After Every N Posts</label>
                <input type="number" id="announce-position" min="1" max="50" value="3" style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--admin-border);background:var(--admin-bg);color:var(--admin-text);font-size:14px;">
              </div>
            </div>
            <p style="font-size:11px;color:var(--admin-text2);margin-top:8px;"><i class="fas fa-info-circle"></i> Position = after how many regular posts the user scrolls before seeing this. Frequency = how often it re-appears for each user.</p>
          </div>

          <div class="announce-controls" style="margin-top:14px;">
            <input type="hidden" id="admin-post-type" value="post">
            <button class="announce-btn" onclick="createAdminPost()"><i class="fas fa-paper-plane"></i> Publish Post</button>
          </div>
        </div>
      </div>

      <!-- Existing admin posts list -->
      <div class="admin-panel" style="margin-top:16px;">
        <div class="panel-header">
          <span class="panel-title">Published Admin Posts</span>
        </div>
        <div class="panel-body" id="admin-posts-list"></div>
      </div>
    </div>

    <!-- ACTIVITY LOG TAB -->
    <div class="tab-panel" id="tab-logs">
      <div class="admin-panel">
        <div class="panel-header">
          <span class="panel-title">Admin Actions</span>
        </div>
        <div class="panel-body" id="logs-list"></div>
      </div>
    </div>
  </main>



  <script>
    const token = localStorage.getItem('admin_token');
    var currentUser;
    try { currentUser = JSON.parse(localStorage.getItem('admin_user')); } catch(e) { currentUser = null; }

    // Redirect to admin login if no admin session
    if (!token || !currentUser) {
      window.location.href = '/admin-login';
    }

    document.getElementById('admin-user').textContent = currentUser ? currentUser.username : '';

    function adminLogout() {
      localStorage.removeItem('admin_token');
      localStorage.removeItem('admin_user');
      window.location.href = '/admin-login';
    }

    // Check admin access via API
    async function checkAdmin() {
      try {
        const res = await fetch('/api/admin/check', { headers: { 'Authorization': 'Bearer ' + token } });
        if (!res.ok) throw new Error();
      } catch {
        localStorage.removeItem('admin_token');
        localStorage.removeItem('admin_user');
        window.location.href = '/admin-login';
      }
    }
    checkAdmin();

    // Tab switching
    document.querySelectorAll('.admin-tab').forEach(function(tab) {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.admin-tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
        if (tab.dataset.tab === 'overview') loadStats();
        if (tab.dataset.tab === 'users') loadUsers();
        if (tab.dataset.tab === 'reports') loadReports();
        if (tab.dataset.tab === 'announcements') loadAdminPosts();
        if (tab.dataset.tab === 'logs') loadLogs();
      });
    });

    // ===== OVERVIEW =====
    async function loadStats() {
      try {
        const res = await fetch('/api/admin/dashboard', { headers: { 'Authorization': 'Bearer ' + token } });
        const data = await res.json();
        if (!data.success) return;
        const s = data.stats;
        document.getElementById('stats-grid').innerHTML = [
          statCard('Total Users', s.totalUsers, '<i class="fas fa-users"></i>'),
          statCard('Active Today', s.activeToday, '<i class="fas fa-circle" style="color:#10b981;font-size:8px;"></i>'),
          statCard('Total Posts', s.totalPosts, '<i class="fas fa-images"></i>'),
          statCard('Pending Reports', s.pendingReports, '<i class="fas fa-flag" style="color:#f59e0b;"></i>'),
          statCard('Banned Users', s.bannedUsers, '<i class="fas fa-ban" style="color:#ef4444;"></i>'),
          statCard('New (7d)', s.recentSignups, '<i class="fas fa-user-plus"></i>'),
          statCard('Communities', s.totalCommunities, '<i class="fas fa-users-cog"></i>'),
          statCard('Events', s.totalEvents, '<i class="fas fa-calendar"></i>')
        ].join('');
      } catch(e) { console.error('Stats error', e); }
    }
    function statCard(label, value, icon) {
      return '<div class="stat-card"><div class="stat-card-label">' + (icon ? icon + ' ' : '') + label + '</div><div class="stat-card-value">' + (value || 0) + '</div></div>';
    }
    loadStats();

    // ===== USERS =====
    let userSearchTimer;
    document.getElementById('user-search').addEventListener('input', function() {
      clearTimeout(userSearchTimer);
      userSearchTimer = setTimeout(loadUsers, 300);
    });
    document.getElementById('user-filter').addEventListener('change', loadUsers);

    async function loadUsers() {
      const search = document.getElementById('user-search').value;
      const filter = document.getElementById('user-filter').value;
      try {
        const res = await fetch('/api/admin/users?search=' + encodeURIComponent(search) + '&filter=' + filter, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        if (!data.success) return;
        document.getElementById('user-total').textContent = data.total + ' users';
        const list = document.getElementById('users-list');
        if (!data.users || data.users.length === 0) {
          list.innerHTML = '<div class="empty-state"><i class="fas fa-users"></i>No users found</div>';
          return;
        }
        list.innerHTML = data.users.map(function(u) {
          var status = '';
          if (u.is_admin) status = '<span class="user-status admin-role"><i class="fas fa-shield-alt"></i> Admin</span>';
          if (u.is_banned) status += '<span class="user-status banned"><i class="fas fa-ban"></i> Banned</span>';
          else if (u.is_deactivated) status += '<span class="user-status deactivated"><i class="fas fa-pause"></i> Deactivated</span>';
          else if (!u.is_admin) status += '<span class="user-status active"><i class="fas fa-check"></i> Active</span>';

          var actions = '';
          if (u.id !== currentUser.id && !u.is_admin) {
            if (u.is_banned) {
              actions = '<button class="action-btn success" onclick="unbanUser(' + u.id + ')"><i class="fas fa-unlock"></i> Unban</button>';
            } else {
              actions = '<button class="action-btn danger" onclick="showBanDialog(' + u.id + ', \'' + u.username.replace(/'/g, "\\'") + '\')"><i class="fas fa-ban"></i> Ban</button>';
            }
          }

          return '<div class="user-row">' +
            '<img class="user-avatar" src="' + (u.profile_picture || '/images/default-avatar.svg') + '" alt="">' +
            '<div class="user-info">' +
              '<div class="user-name">' + u.username + (u.fullname ? ' <span style="color:var(--admin-text2);font-weight:400;">(' + u.fullname + ')</span>' : '') + '</div>' +
              '<div class="user-email">' + u.email + '</div>' +
              '<div class="user-meta"><span>' + (u.post_count || 0) + ' posts</span><span>' + (u.follower_count || 0) + ' followers</span><span>Joined ' + new Date(u.created_at).toLocaleDateString() + '</span></div>' +
            '</div>' +
            '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">' + status + '</div>' +
            '<div class="user-actions">' + actions + '</div>' +
          '</div>';
        }).join('');
      } catch(e) { console.error('Users error', e); }
    }

    function showBanDialog(userId, username) {
      var overlay = document.createElement('div');
      overlay.className = 'ban-overlay';
      overlay.innerHTML = '<div class="ban-dialog">' +
        '<h3><i class="fas fa-ban" style="color:var(--admin-danger);margin-right:8px;"></i>Ban ' + username + '</h3>' +
        '<label>Ban Type</label>' +
        '<select id="ban-type"><option value="temp">Temporary</option><option value="permanent">Permanent</option></select>' +
        '<div id="ban-duration-wrap"><label>Duration (days)</label><input id="ban-days" type="number" min="1" max="365" value="7"></div>' +
        '<label>Reason</label>' +
        '<textarea id="ban-reason" placeholder="Reason for banning..."></textarea>' +
        '<div class="ban-dialog-buttons">' +
          '<button onclick="this.closest(\'.ban-overlay\').remove()" style="background:transparent;border:1px solid var(--admin-border);color:var(--admin-text);">Cancel</button>' +
          '<button onclick="executeBan(' + userId + ')" style="background:var(--admin-danger);border:none;color:#fff;">Ban User</button>' +
        '</div>' +
      '</div>';
      document.body.appendChild(overlay);
      overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
      document.getElementById('ban-type').addEventListener('change', function() {
        document.getElementById('ban-duration-wrap').style.display = this.value === 'permanent' ? 'none' : 'block';
      });
    }

    async function executeBan(userId) {
      var type = document.getElementById('ban-type').value;
      var reason = document.getElementById('ban-reason').value || 'Policy violation';
      var days = type === 'permanent' ? null : parseInt(document.getElementById('ban-days').value) || 7;
      try {
        var body = { reason: reason };
        if (days) body.duration_days = days;
        var res = await fetch('/api/admin/users/' + userId + '/ban', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        var data = await res.json();
        if (data.success) {
          showAlert(data.message, 'success');
          document.querySelector('.ban-overlay')?.remove();
          loadUsers();
        } else {
          showAlert(data.error || 'Failed to ban', 'error');
        }
      } catch(e) { showAlert('Failed to ban user', 'error'); }
    }

    async function unbanUser(userId) {
      if (!confirm('Unban this user?')) return;
      try {
        var res = await fetch('/api/admin/users/' + userId + '/ban', {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        var data = await res.json();
        if (data.success) {
          showAlert('User unbanned', 'success');
          loadUsers();
        }
      } catch(e) { showAlert('Failed', 'error'); }
    }

    // ===== REPORTS =====
    document.getElementById('report-filter').addEventListener('change', loadReports);

    async function loadReports() {
      var status = document.getElementById('report-filter').value;
      try {
        var res = await fetch('/api/admin/reports?status=' + status, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        var data = await res.json();
        var list = document.getElementById('reports-list');
        if (!data.reports || data.reports.length === 0) {
          list.innerHTML = '<div class="empty-state"><i class="fas fa-flag"></i>No ' + status + ' reports</div>';
          return;
        }
        list.innerHTML = data.reports.map(function(r) {
          var postPreview = r.post_content || '';
          if (postPreview.length > 200) postPreview = postPreview.substring(0, 200) + '...';
          var images = '';
          if (r.post_images) {
            try {
              var imgs = JSON.parse(r.post_images);
              if (imgs.length > 0) images = '<img src="' + imgs[0] + '" style="width:80px;height:80px;object-fit:cover;border-radius:8px;margin-top:8px;">';
            } catch(e) {}
          }
          var actions = '';
          if (status === 'pending') {
            actions = '<div class="report-actions">' +
              '<button class="action-btn danger" onclick="adminDeletePost(' + r.post_id + ', ' + r.report_id + ')"><i class="fas fa-trash"></i> Delete Post</button>' +
              '<button class="action-btn" onclick="dismissReport(' + r.report_id + ')"><i class="fas fa-times"></i> Dismiss</button>' +
              '<button class="action-btn danger" onclick="showBanDialog(' + r.post_owner_id + ', \'' + r.post_owner_username.replace(/'/g, "\\'") + '\')"><i class="fas fa-ban"></i> Ban User</button>' +
            '</div>';
          }
          return '<div class="report-row">' +
            '<div class="report-header">' +
              '<span class="report-reason">' + r.reason + '</span>' +
              '<span class="report-date">' + new Date(r.reported_at).toLocaleString() + '</span>' +
            '</div>' +
            '<div class="report-content">' + postPreview + images + '</div>' +
            '<div class="report-meta">' +
              '<span><i class="fas fa-flag"></i> Reported by: <strong>' + r.reporter_username + '</strong></span>' +
              '<span><i class="fas fa-user"></i> Post by: <strong>' + r.post_owner_username + '</strong></span>' +
            '</div>' +
            (r.details ? '<div style="font-size:12px;color:var(--admin-text2);margin:4px 0;">Details: ' + r.details + '</div>' : '') +
            actions +
          '</div>';
        }).join('');
      } catch(e) { console.error('Reports error', e); }
    }

    async function adminDeletePost(postId, reportId) {
      if (!confirm('Delete this post? This cannot be undone.')) return;
      var reason = prompt('Reason for deletion:', 'Community guideline violation');
      if (reason === null) return;
      try {
        var res = await fetch('/api/admin/posts/' + postId, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ reason: reason })
        });
        var data = await res.json();
        if (data.success) {
          showAlert('Post deleted', 'success');
          loadReports();
          loadStats();
        }
      } catch(e) { showAlert('Failed to delete post', 'error'); }
    }

    async function dismissReport(reportId) {
      try {
        await fetch('/api/admin/reports/' + reportId, {
          method: 'PUT',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'dismiss' })
        });
        showAlert('Report dismissed', 'success');
        loadReports();
      } catch(e) { showAlert('Failed', 'error'); }
    }

    // ===== ADMIN POST CREATION =====
    var adminPostFiles = [];

    function toggleAdminPostType(type) {
      document.getElementById('admin-post-type').value = type;
      var postBtn = document.getElementById('btn-post-type');
      var seriesBtn = document.getElementById('btn-series-type');
      if (type === 'series') {
        seriesBtn.style.background = 'var(--admin-accent)';
        seriesBtn.style.color = '#fff';
        seriesBtn.style.borderColor = 'var(--admin-accent)';
        postBtn.style.background = '';
        postBtn.style.color = '';
        postBtn.style.borderColor = '';
      } else {
        postBtn.style.background = 'var(--admin-accent)';
        postBtn.style.color = '#fff';
        postBtn.style.borderColor = 'var(--admin-accent)';
        seriesBtn.style.background = '';
        seriesBtn.style.color = '';
        seriesBtn.style.borderColor = '';
      }
    }

    function previewAdminMedia(input) {
      var preview = document.getElementById('admin-media-preview');
      preview.innerHTML = '';
      adminPostFiles = Array.from(input.files);
      adminPostFiles.forEach(function(file, i) {
        var wrap = document.createElement('div');
        wrap.style.cssText = 'position:relative;width:80px;height:80px;border-radius:10px;overflow:hidden;border:1px solid var(--admin-border);';
        if (file.type.startsWith('video/')) {
          var vid = document.createElement('video');
          vid.src = URL.createObjectURL(file);
          vid.style.cssText = 'width:100%;height:100%;object-fit:cover;';
          wrap.appendChild(vid);
          var badge = document.createElement('span');
          badge.style.cssText = 'position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,0.7);color:#fff;font-size:9px;padding:2px 5px;border-radius:4px;';
          badge.textContent = 'VIDEO';
          wrap.appendChild(badge);
        } else {
          var img = document.createElement('img');
          img.src = URL.createObjectURL(file);
          img.style.cssText = 'width:100%;height:100%;object-fit:cover;';
          wrap.appendChild(img);
        }
        var removeBtn = document.createElement('button');
        removeBtn.style.cssText = 'position:absolute;top:2px;right:2px;background:rgba(0,0,0,0.7);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;';
        removeBtn.innerHTML = '&times;';
        removeBtn.onclick = function() { adminPostFiles.splice(i, 1); wrap.remove(); };
        wrap.appendChild(removeBtn);
        preview.appendChild(wrap);
      });
    }

    async function createAdminPost() {
      var content = document.getElementById('announce-content').value.trim();
      var freq = document.getElementById('announce-freq').value;
      var position = document.getElementById('announce-position').value || '3';
      var postType = document.getElementById('admin-post-type').value;

      if (!content && adminPostFiles.length === 0) {
        showAlert('Add content or media', 'error');
        return;
      }

      var formData = new FormData();
      formData.append('content', content);
      formData.append('frequency', freq);
      formData.append('feed_position', position);
      if (postType === 'series') formData.append('is_creator_series', 'true');

      adminPostFiles.forEach(function(file) {
        if (file.type.startsWith('video/')) {
          formData.append('video', file);
        } else {
          formData.append('images', file);
        }
      });

      try {
        var res = await fetch('/api/admin/announcements', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token },
          body: formData
        });
        var data = await res.json();
        if (data.success) {
          showAlert('Admin post published!', 'success');
          document.getElementById('announce-content').value = '';
          document.getElementById('admin-media-preview').innerHTML = '';
          document.getElementById('admin-post-media').value = '';
          adminPostFiles = [];
          loadStats();
          loadAdminPosts();
        } else {
          showAlert(data.error || 'Failed', 'error');
        }
      } catch(e) { showAlert('Failed to publish', 'error'); }
    }

    async function loadAdminPosts() {
      try {
        var res = await fetch('/api/admin/admin-posts', { headers: { 'Authorization': 'Bearer ' + token } });
        var data = await res.json();
        var list = document.getElementById('admin-posts-list');
        if (!data.success || !data.posts || data.posts.length === 0) {
          list.innerHTML = '<div class="empty-state"><i class="fas fa-bullhorn"></i>No admin posts yet</div>';
          return;
        }
        list.innerHTML = data.posts.map(function(p) {
          var media = '';
          if (p.images) {
            try {
              var imgs = JSON.parse(p.images);
              imgs.forEach(function(img) {
                media += '<img src="' + img + '" style="width:60px;height:60px;object-fit:cover;border-radius:8px;margin-right:4px;">';
              });
            } catch(e) {}
          }
          if (p.video_url) {
            media += '<span style="font-size:11px;color:var(--admin-accent2);"><i class="fas fa-video"></i> Video</span>';
          }
          return '<div class="user-row">' +
            '<div class="user-info" style="flex:1;">' +
              '<div class="user-name" style="margin-bottom:4px;">' + (p.content ? p.content.substring(0, 100) + (p.content.length > 100 ? '...' : '') : '[Media only]') + '</div>' +
              '<div style="display:flex;gap:4px;align-items:center;margin-bottom:4px;">' + media + '</div>' +
              '<div class="user-meta">' +
                '<span><i class="fas fa-redo"></i> ' + p.admin_frequency + '</span>' +
                '<span><i class="fas fa-sort-numeric-down"></i> After ' + (p.admin_feed_position || 3) + ' posts</span>' +
                '<span>' + new Date(p.created_at).toLocaleDateString() + '</span>' +
                (p.is_creator_series ? '<span style="color:var(--admin-accent2);">Creator Series</span>' : '') +
              '</div>' +
            '</div>' +
            '<button class="action-btn danger" onclick="deleteAdminPost(' + p.id + ')"><i class="fas fa-trash"></i></button>' +
          '</div>';
        }).join('');
      } catch(e) { console.error('Admin posts error', e); }
    }

    async function deleteAdminPost(postId) {
      if (!confirm('Delete this admin post?')) return;
      try {
        await fetch('/api/admin/posts/' + postId, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ reason: 'Admin removed own post' })
        });
        showAlert('Post deleted', 'success');
        loadAdminPosts();
      } catch(e) { showAlert('Failed', 'error'); }
    }

    // Simple alert function (no dependency on app.js)
    function showAlert(msg, type) {
      var el = document.createElement('div');
      el.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:14px;font-weight:600;z-index:99999;animation:fadeInDown 0.3s;color:#fff;' +
        (type === 'error' ? 'background:#ef4444;' : 'background:#10b981;');
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(function() { el.remove(); }, 3000);
    }

    // ===== ACTIVITY LOG =====
    async function loadLogs() {
      try {
        var res = await fetch('/api/admin/actions', { headers: { 'Authorization': 'Bearer ' + token } });
        var data = await res.json();
        var list = document.getElementById('logs-list');
        if (!data.actions || data.actions.length === 0) {
          list.innerHTML = '<div class="empty-state"><i class="fas fa-history"></i>No admin actions yet</div>';
          return;
        }
        list.innerHTML = data.actions.map(function(a) {
          var typeClass = 'announce';
          if (a.action_type.includes('ban')) typeClass = 'ban';
          if (a.action_type === 'unban') typeClass = 'unban';
          if (a.action_type === 'delete_post') typeClass = 'delete';

          var desc = a.action_type.replace(/_/g, ' ');
          if (a.target_username) desc += ' — ' + a.target_username;

          return '<div class="log-row">' +
            '<span class="log-time">' + new Date(a.created_at).toLocaleString() + '</span>' +
            '<span class="log-action"><span class="log-type ' + typeClass + '">' + a.action_type.replace(/_/g, ' ') + '</span> ' +
            '<span style="color:var(--admin-text2);">by </span><strong>' + a.admin_username + '</strong>' +
            (a.target_username ? ' <span style="color:var(--admin-text2);">→</span> ' + a.target_username : '') +
            '</span></div>';
        }).join('');
      } catch(e) { console.error('Logs error', e); }
    }

    // Also serve admin page route
  </script>
</body>
</html>
