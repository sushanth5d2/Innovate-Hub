<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Innovate Hub</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #07070d;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
    }
    .admin-login-wrap {
      width: 100%; max-width: 400px; padding: 20px;
    }
    .admin-login-card {
      background: #111118;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 40px 32px;
    }
    .admin-login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .admin-shield {
      width: 64px; height: 64px; margin: 0 auto 16px;
      background: linear-gradient(135deg, rgba(108,92,231,0.15), rgba(162,155,254,0.08));
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .admin-shield i { font-size: 28px; color: #a29bfe; }
    .admin-login-header h1 {
      font-size: 22px; font-weight: 800; color: #f0f0f5;
      margin-bottom: 6px;
    }
    .admin-login-header p {
      font-size: 13px; color: #666680;
    }
    .admin-form-group {
      margin-bottom: 16px;
    }
    .admin-form-group label {
      display: block; font-size: 12px; font-weight: 600;
      color: #8888a0; text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .admin-input-wrap {
      position: relative;
    }
    .admin-input-wrap i {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: #555568; font-size: 14px; pointer-events: none;
    }
    .admin-input-wrap input {
      width: 100%; padding: 13px 14px 13px 40px;
      background: #0a0a12; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; color: #f0f0f5; font-size: 15px; outline: none;
      transition: border-color 0.2s;
    }
    .admin-input-wrap input:focus {
      border-color: #6c5ce7;
    }
    .admin-input-wrap input::placeholder { color: #44445a; }
    .admin-login-btn {
      width: 100%; padding: 14px; margin-top: 8px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      border: none; border-radius: 12px; color: #fff;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: all 0.2s;
    }
    .admin-login-btn:hover { box-shadow: 0 6px 20px rgba(108,92,231,0.3); }
    .admin-login-btn:disabled {
      opacity: 0.6; cursor: not-allowed;
    }
    .admin-error {
      margin-top: 14px; padding: 10px 14px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px; color: #ef4444;
      font-size: 13px; display: none; text-align: center;
    }
    .admin-back {
      display: block; text-align: center; margin-top: 20px;
      color: #555568; font-size: 13px; text-decoration: none;
      transition: color 0.2s;
    }
    .admin-back:hover { color: #8888a0; }
    .toggle-pass {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      color: #555568; cursor: pointer; background: none; border: none;
      font-size: 14px; padding: 4px;
    }
  </style>
</head>
<body>
  <div class="admin-login-wrap">
    <div class="admin-login-card">
      <div class="admin-login-header">
        <div class="admin-shield"><i class="fas fa-shield-alt"></i></div>
        <h1>Admin Portal</h1>
        <p>Secure access for administrators only</p>
      </div>
      <form id="admin-login-form" autocomplete="off">
        <div class="admin-form-group">
          <label>Email</label>
          <div class="admin-input-wrap">
            <i class="fas fa-envelope"></i>
            <input type="email" id="admin-email" placeholder="Admin email" required autocomplete="email">
          </div>
        </div>
        <div class="admin-form-group">
          <label>Password</label>
          <div class="admin-input-wrap">
            <i class="fas fa-lock"></i>
            <input type="password" id="admin-password" placeholder="Password" required autocomplete="current-password">
            <button type="button" class="toggle-pass" onclick="togglePassword()"><i class="fas fa-eye"></i></button>
          </div>
        </div>
        <button type="submit" class="admin-login-btn" id="admin-login-btn">
          <i class="fas fa-sign-in-alt"></i> Sign In
        </button>
        <div class="admin-error" id="admin-error"></div>
      </form>
    </div>
    <a href="/login" class="admin-back"><i class="fas fa-arrow-left"></i> Back to user login</a>
  </div>

  <script>
    function togglePassword() {
      var inp = document.getElementById('admin-password');
      var icon = document.querySelector('.toggle-pass i');
      if (inp.type === 'password') {
        inp.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        inp.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    document.getElementById('admin-login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      var errorEl = document.getElementById('admin-error');
      var btn = document.getElementById('admin-login-btn');
      errorEl.style.display = 'none';

      var email = document.getElementById('admin-email').value.trim();
      var password = document.getElementById('admin-password').value;

      if (!email || !password) {
        errorEl.textContent = 'Please fill in all fields';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';

      try {
        var res = await fetch('/api/auth/admin-login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: password })
        });
        var data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Login failed';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
          return;
        }

        // Store admin session
        localStorage.setItem('admin_token', data.token);
        localStorage.setItem('admin_user', JSON.stringify(data.user));
        // Also store regular user session so admin can browse app pages
        if (data.userToken) {
          localStorage.setItem('token', data.userToken);
          localStorage.setItem('user', JSON.stringify(data.user));
        }
        window.location.href = '/admin';
      } catch (err) {
        errorEl.textContent = 'Connection error. Please try again.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
      }
    });
  </script>
</body>
</html>
