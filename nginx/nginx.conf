worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/m;

    # Upstream backends
    upstream node_app {
        server app:3000;
        keepalive 32;
    }

    upstream ml_service {
        server ml-service:5000;
    }

    # ==========================================
    # HTTP -> HTTPS redirect
    # ==========================================
    server {
        listen 80;
        server_name ${DOMAIN_NAME:-localhost};
        # In production, redirect all HTTP to HTTPS:
        # return 301 https://$server_name$request_uri;
        # For development without SSL, proxy directly:
        location / {
            proxy_pass http://node_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ==========================================
    # MAIN SERVER BLOCK (SSL/HTTPS)
    # Enable this block in production with valid certificates.
    # Use certbot/Let's Encrypt: certbot certonly --webroot -w /var/www/certbot -d yourdomain.com
    # Mount certs into container: volumes: ./ssl:/etc/nginx/ssl:ro
    # ==========================================
    server {
        listen 443 ssl http2;
        server_name ${DOMAIN_NAME:-localhost};

        # SSL certificates — update paths to your cert files
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Static files - served directly by nginx (fast)
        location /css/ {
            proxy_pass http://node_app;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location /js/ {
            proxy_pass http://node_app;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location /images/ {
            proxy_pass http://node_app;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /uploads/ {
            proxy_pass http://node_app;
            expires 30d;
            add_header Cache-Control "public";
        }

        # API routes - rate limited
        location /api/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://node_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://node_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Socket.IO - WebSocket upgrade
        location /socket.io/ {
            proxy_pass http://node_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }

        # All other routes - proxy to Node.js
        location / {
            proxy_pass http://node_app;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
